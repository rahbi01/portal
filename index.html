{% extends "base.html" %}
{% block title %}الرئيسية - الطلبات{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-clipboard-list"></i> قائمة الطلبات</h2>
    <button class="btn btn-success btn-lg" data-bs-toggle="modal" data-bs-target="#newRequestModal">
        <i class="fas fa-plus-circle"></i> طلب جديد
    </button>
</div>

<!-- فلتر البحث -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-3">
                <label>الموظف (المستلم)</label>
                <input type="text" id="filterReceiver" class="form-control" placeholder="اسم الموظف">
            </div>
            <div class="col-md-3">
                <label>القسم/المدرسة</label>
                <input type="text" id="filterDepartment" class="form-control" placeholder="القسم">
            </div>
            <div class="col-md-2">
                <label>من تاريخ</label>
                <input type="date" id="filterDateFrom" class="form-control">
            </div>
            <div class="col-md-2">
                <label>إلى تاريخ</label>
                <input type="date" id="filterDateTo" class="form-control">
            </div>
            <div class="col-md-2 align-self-end">
                <button id="applyFilterBtn" class="btn btn-primary w-100"><i class="fas fa-search"></i> بحث</button>
            </div>
        </div>
    </div>
</div>

<!-- جدول الطلبات -->
<div id="requestsTableContainer">
    {% include 'requests_table.html' %}
</div>

<!-- مودال إضافة طلب جديد -->
<div class="modal fade" id="newRequestModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-plus"></i> طلب جديد</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="newRequestForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>القسم/المدرسة *</label>
                            <select name="department" class="form-select" required>
                                {% for d in departments %}<option value="{{ d.name }}">{{ d.name }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>الخدمة المطلوبة *</label>
                            <select name="service" class="form-select" required>
                                {% for s in services %}<option value="{{ s.name }}">{{ s.name }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>النظام *</label>
                            <select name="system" class="form-select" required>
                                {% for sys in systems %}<option value="{{ sys.name }}">{{ sys.name }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>طلب الخدمة عبر *</label>
                            <select name="request_via" class="form-select" required>
                                {% for rv in request_via %}<option value="{{ rv.name }}">{{ rv.name }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>تاريخ الاستلام *</label>
                            <input type="date" name="receive_date" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>تاريخ الرد</label>
                            <input type="date" name="response_date" id="responseDateInput" class="form-control">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label>أيام العمل (تلقائي)</label>
                            <input type="text" id="workdaysDisplay" class="form-control" readonly>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label>تفاصيل الطلب</label>
                            <textarea name="details" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label>الموظف المستلم *</label>
                            <input type="text" name="receiver" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                        <button type="submit" class="btn btn-primary">حفظ الطلب</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
