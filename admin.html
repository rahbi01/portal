{% extends "base.html" %}
{% block title %}الإدارة{% endblock %}
{% block content %}
<h2><i class="fas fa-cogs"></i> لوحة الإدارة</h2>
<ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#depts">الأقسام</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#servs">الخدمات</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#syss">الأنظمة</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#rvs">وسائل الطلب</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#hols">الإجازات</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#stats">إحصائيات</button></li>
</ul>
<div class="tab-content">
    <!-- الأقسام -->
    <div class="tab-pane fade show active" id="depts">
        <div class="card"><div class="card-body">
            <h5>إضافة قسم جديد</h5><input type="text" id="deptName" class="form-control mb-2"><button class="btn btn-primary add-single" data-table="Departments" data-input="deptName">إضافة</button>
            <h5 class="mt-3">إضافة عدة أقسام</h5><textarea id="deptBulk" class="form-control mb-2" rows="2"></textarea><button class="btn btn-info add-bulk" data-table="Departments" data-input="deptBulk">إضافة الجميع</button>
            <h5 class="mt-3">القائمة الحالية</h5><table class="table table-sm"><thead><tr><th>#</th><th>الاسم</th><th></th></tr></thead><tbody id="deptsList">{% for d in departments %}<tr data-id="{{ d.id }}"><td>{{ d.id }}</td><td>{{ d.name }}</td><td><button class="btn btn-danger btn-sm delete-item" data-table="Departments" data-id="{{ d.id }}">حذف</button></td></tr>{% endfor %}</tbody></table>
        </div></div>
    </div>
    <!-- الخدمات (نفس الهيكل) -->
    <div class="tab-pane fade" id="servs">... (مشابه)</div>
    <!-- الأنظمة -->
    <div class="tab-pane fade" id="syss">...</div>
    <!-- وسائل الطلب -->
    <div class="tab-pane fade" id="rvs">...</div>
    <!-- الإجازات -->
    <div class="tab-pane fade" id="hols">...</div>
    <!-- الإحصائيات -->
    <div class="tab-pane fade" id="stats">
        <canvas id="statsChart" width="400" height="200"></canvas>
        <div id="statsData" class="mt-3"></div>
    </div>
</div>
{% endblock %}
